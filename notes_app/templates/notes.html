{% extends "base.html" %} {% block content %}
<h2>Create Note</h2>
<form action="{{ url_for('web.get_notes_page') }}" method="POST">
  <p>
    <label for="title">Title: </label>
    <input type="text" name="title" id="title" placeholder="Title" required />
    <label for="content">Content: </label>
    <input
      type="text"
      name="content"
      id="content"
      placeholder="Content"
      required
    />
    <label for="category">Category: </label>
    <input
      type="text"
      name="category"
      id="category"
      placeholder="Category"
      required
    />
    <button type="submit">Create</button>
  </p>
</form>
<hr />
<h2>Filters</h2>
<form action="{{ url_for('web.get_notes_page') }}" method="GET">
  <label for="category_filter">Category: </label>
  <input
    type="text"
    name="category"
    id="category_filter"
    placeholder="Enter category"
  />
  <label for="created_date_filter">Created date: </label>
  <input
    type="text"
    name="created_date"
    id="created_date_filter"
    placeholder="Enter date like 2000-01-01"
  />
  <label for="search">Search text: </label>
  <input
    type="text"
    name="search"
    id="search"
    placeholder="Enter what you want to find"
  />
  <label for="sort">Sort by: </label>
  <select name="sort" id="sort">
    <option value="id">Id</option>
    <option value="title">Title</option>
    <option value="created_at" selected>Created at</option>
  </select>
  <label for="order">Order: </label>
  <select name="order" id="order">
    <option value="asc">Asc</option>
    <option value="desc" selected>Desc</option>
  </select>
  <button type="submit">Apply</button>
  <a href="{{ url_for('web.get_notes_page') }}">All Notes</a>
</form>
<hr />
<table border="1" cellpadding="10" cellspacing="0">
  <thead>
    <tr>
      <th>Id</th>
      <th>Title</th>
      <th>Content</th>
      <th>Category</th>
      <th>Created at</th>
      <th>Update</th>
      <th>Delete</th>
    </tr>
  </thead>
  <tbody>
    {% for note in notes %}
    <tr>
      <td>{{ note.id }}</td>
      <td>{{ note.title }}</td>
      <td>{{ note.content }}</td>
      <td>{{ note.category }}</td>
      <td>{{ note.created_at }}</td>
      <td>
        <form
          action="{{ url_for('web.update_note_page', note_id=note.id) }}"
          method="POST"
        >
          <input
            type="text"
            name="title"
            placeholder="New title"
            value="{{ note.title }}"
            required
          />
          <input
            type="text"
            name="content"
            placeholder="New content"
            value="{{ note.content }}"
            required
          />
          <input
            type="text"
            name="category"
            placeholder="New category"
            value="{{ note.category }}"
            required
          />
          <button type="submit">Update</button>
        </form>
      </td>
      <td>
        <form
          action="{{ url_for('web.delete_note_page', note_id=note.id) }}"
          method="POST"
        >
          <button type="submit">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
